<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRACTICULARIUM OMS</title>

<link rel="stylesheet" href="../css/admin.css">

</head>

<body>

<div class="container">

<header class="page-header">

<h1>PRACTICULARIUM OMS</h1>

<a class="back-link" href="orders.html">
← До списку замовлень
</a>

</header>

<div class="order-header">

<div>

<h2 id="orderNumber">
Замовлення
</h2>

</div>

<div>

<select id="statusSelect">

<option>NEW</option>
<option>CONFIRMED</option>
<option>WAITING_PREPAYMENT</option>
<option>PAYMENT_RECEIVED</option>
<option>PACKING</option>
<option>SHIPPED</option>
<option>DELIVERED</option>
<option>COMPLETED</option>
<option>CANCELLED</option>

</select>

</div>

</div>

<div class="cards">

<section class="card">

<h3>👤 Клієнт</h3>

<p><strong>Ім'я</strong></p>
<p id="customerName"></p>

<p><strong>Email</strong></p>
<p id="customerEmail"></p>

<p><strong>Телефон</strong></p>
<p id="customerPhone"></p>

</section>

<section class="card">

<h3>📚 Замовлення</h3>

<p><strong>Книга</strong></p>
<p id="productName"></p>

<p><strong>Кількість</strong></p>
<p id="quantity"></p>

<p><strong>Ціна</strong></p>
<p id="price"></p>

</section>

<section class="card">

<h3>💳 Оплата</h3>

<p id="paymentMethod"></p>

</section>

<section class="card">

<h3>🚚 Доставка</h3>

<p id="deliveryMethod"></p>

<p id="deliveryCountry"></p>

<p id="deliveryCity"></p>

<p id="deliveryAddress"></p>

</section>

<section class="card">

<h3>💬 Коментар</h3>

<p id="comment"></p>

</section>

<section class="card">

<h3>⚙ Системна інформація</h3>

<p><strong>Створено</strong></p>
<p id="createdAt"></p>

<p><strong>Оновлено</strong></p>
<p id="updatedAt"></p>

</section>

</div>

</div>

<script src="order.js"></script>

</body>

</html>
