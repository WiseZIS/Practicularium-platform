<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Замовлення PRACTICULARIUM</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
            color: #2c3e50;
        }

        table {
            border-spacing: 0;
            border-collapse: collapse;
        }

        img {
            border: 0;
            display: block;
            max-width: 100%;
        }

        .wrapper {
            width: 100%;
            background-color: #f4f6f9;
            padding: 40px 0;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .section {
            padding: 40px;
        }

        .header {
        }

        .content {
        }

        .footer {
        }

        @media screen and (max-width:620px) {

            .section {
                padding: 24px;
            }

        }
    </style>

</head>

<body>

<div class="wrapper">

    <div class="container">

        <div class="header section" style="text-align:center;">

    <img
        src="../../../img/logo/logo-email.png"
        alt="PRACTICULARIUM"
        style="
            width:220px;
            height:auto;
            display:block;
            margin:0 auto 24px auto;
        ">

    <p style="
        margin:0;
		padding-bottom:20px;
        font-size:17px;
        line-height:28px;
        color:#7b8794;
		border-bottom:1px solid #e9ecef;
    ">
        Книги, що змінюють спосіб мислення
    </p>

</div>

        <div class="content section" style="text-align:center;">

    <h2 style="
        margin:0 0 18px 0;
        font-size:30px;
        font-weight:700;
        color:#1f3c88;
    ">
        Дякуємо за довіру до PRACTICULARIUM!
    </h2>

    <p style="
        margin:0;
        font-size:18px;
        line-height:30px;
        color:#4a5568;
    ">
        Ваше замовлення успішно отримано.
    </p>

    <hr style="
        border:none;
        border-top:1px solid #e9ecef;
        margin:40px 0;
    ">

    <h3 style="
        margin:0 0 24px 0;
        font-size:22px;
        color:#1f3c88;
        text-align:left;
    ">
        Інформація про замовлення
    </h3>

    <table style="
        width:100%;
        border-collapse:collapse;
        font-size:16px;
        text-align:left;
    ">

        <tr>
            <td style="padding:12px 0;color:#6c757d;">
                Номер замовлення
            </td>

            <td style="
                padding:12px 0;
                text-align:right;
                font-weight:bold;
            ">
                {{orderId}}
            </td>
        </tr>

        <tr>
            <td style="padding:12px 0;color:#6c757d;">
                Дата
            </td>

            <td style="
                padding:12px 0;
                text-align:right;
                font-weight:bold;
            ">
                {{orderDate}}
            </td>
        </tr>

        <tr>
            <td style="padding:12px 0;color:#6c757d;">
                Статус
            </td>

            <td style="
                padding:12px 0;
                text-align:right;
                color:#198754;
                font-weight:bold;
            ">
                Отримано
            </td>
        </tr>

    </table>

</div>

        <div class="footer section">

            <!-- Footer -->

        </div>

    </div>

</div>

</body>
</html>
